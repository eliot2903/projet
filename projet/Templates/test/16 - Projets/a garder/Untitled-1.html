<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
    <title>Projet2-Cryptographie</title>
</head>
<body>
    <h1><u><b>Projet 2 - Cryptographie :</b></u></h1>
    <img src="{{ url_for('static', filename='Logo.png') }}" class="Image" align="right">
    
    <form method="POST">
        <h5>Entrez votre texte à crypter :</h5>
        <textarea name="phrase" placeholder='Entrez du texte ici'>{{ ancienne_phrase }}</textarea>
    
        <h5>Votre mot de passe :</h5>
        <div class="ligne-cle">
            <textarea name="clé" placeholder='Entrez la clé ici' id="cle_input">{{ ancienne_cle }}</textarea>
            <button type="submit" class="Bouton">Crypter</button>
        </div>
    </form>
    <input onclick="changeText()" type="button" value="Cacher le mot de passe" id="btn" class="Bouton2">
    
    <p>Besoin de décrypter ? <a href="/decrypter">Cliquez ici</a></p>

    <br>
    <h5>Votre texte de sortie : </h5>
    <div id="res" class="box">{{ resultat }}</div>

    <script src="{{ url_for('static', filename='Action.js') }}"></script>
</body>
</html>
