<meta charset="UTF-8">
<title>Chiffre de Vernam</title>

</head>

<body>

<div class="menu-btn" id="menu-btn">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="menu" id="menu">
  <button class="close-btn" id="close-btn">X</button>
  <a href="/">Page d'accueil</a>

<!-- CARTE 1 -->
<div class="card">
    <h1>🔐 Vernam</h1>

    <form method="POST">
        <label>Texte</label>
        <textarea name="Entre_texte" id="inputText" placeholder="Entrez votre message"></textarea>

        <div class="buttons">
            <button type="submit">Crypter</button>
        </div>

        <label>Clé</label>
        <textarea name="Cle" id="output">{{resultat}}</textarea>

        <label>Résultat</label>
        <textarea name="Res" id="output" readonly>{{resultat2}}</textarea>
</div>

<div class="card2">
    <h1>🔐 Vernam</h1>

        <label>Texte</label>
        <textarea name="Entre_texte2" id="inputText" placeholder="Entrez votre texte à décrypter"></textarea>

        <label>Clé </label>
        <input name="Cle2" type="text" id="key" placeholder="Entrez la clé">

        <div class="buttons">
            <button type="submit">Décrypter</button>
        </div>

        <label>Résultat</label>
        <textarea name="Res2" id="output" readonly>{{resultat3}}</textarea>
    </form>
</div>

<script src="{{ url_for('static', filename='Action.js') }}"></script>
</body>
</html>
